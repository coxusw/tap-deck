<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tap-Deck Shop</title>
  <meta name="description" content="Tap-Deck NFC devices pre-loaded with your profile." />

  <!-- Shared site styling -->
  <link rel="stylesheet" href="/base.css?v=1" />

  <style>
    /* Shop-specific tweaks that still respect base.css look */
    .shop-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .shop-title{
      margin:0;
      font-weight:950;
      letter-spacing:-.2px;
      font-size:28px;
      line-height:1.1;
    }

    .shop-sub{
      margin:8px 0 0;
      color:rgba(238,242,255,.78);
      line-height:1.5;
      font-size:13px;
      max-width:720px;
    }

    .shop-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .shop-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:12px;
    }
    @media (min-width: 760px){
      .shop-grid{ grid-template-columns: 1fr 1fr; }
    }

    .shop-item{
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.14);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 18px 60px rgba(0,0,0,.12);
    }

    .shop-item h2{
      margin:0 0 8px;
      font-size:15px;
      font-weight:950;
      letter-spacing:-.1px;
    }

    .shop-item p{
      margin:0 0 12px;
      color:rgba(238,242,255,.78);
      font-size:13px;
      line-height:1.45;
    }

    .shop-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .shop-price{
      font-weight:950;
      color:rgba(238,242,255,.92);
      font-size:13px;
    }

    /* Make the buy button feel like your site buttons */
    .shop-buy{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(34,197,94,.30);
      background:linear-gradient(90deg, rgba(34,197,94,.24), rgba(6,182,212,.18));
      color:inherit;
      font-weight:950;
      text-decoration:none;
      min-width:180px;
      cursor:pointer;
      white-space:nowrap;
    }

    .shop-note{
      margin-top:12px;
      color:rgba(238,242,255,.62);
      font-size:12px;
      line-height:1.45;
    }

    /* If your base.css already defines .pill, this will just “fit in”.
       If not, this provides a compatible fallback. */
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:inherit;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <div class="shop-head">
        <div>
          <h1 class="shop-title">Shop</h1>
          <p class="shop-sub">
            All items come <b>pre-loaded with your Tap-Deck profile</b>.
            If you haven’t created your profile yet, start in the Theme Gallery first.
          </p>
        </div>

        <div class="shop-actions">
          <a class="pill" href="/">Home</a>
          <a class="pill" href="/theme-gallery/">Theme Gallery</a>
          <a class="pill" href="mailto:support@tap-deck.com">Support</a>
        </div>
      </div>

      <div class="shop-grid" id="grid" aria-label="Shop items"></div>

      <div class="shop-note">
        Checkout uses Square payment links. After purchase, we’ll ensure your device is linked to your profile.
      </div>
    </section>
  </main>

  <script>
    // ✅ EDIT PRODUCTS HERE (easy)
    // Add a new item by copying an object and changing name/desc/price/payLink.
    const PRODUCTS = [
      {
        name: "3D Printed NFC Expo Sign + Profile QR",
        desc: "Perfect for vendor tables and events — tap or scan to open your profile instantly.",
        price: "$— (Square link)",
        payLink: "https://square.link/u/tvd67HVK"
      },
      {
        name: "NFC Card",
        desc: "Classic tap-to-share card for business or personal networking.",
        price: "$— (Square link)",
        payLink: "https://square.link/u/tvd67HVK"
      },
      {
        name: "NFC Bracelet",
        desc: "Wearable tap-to-share — great for creators, events, and social use.",
        price: "$— (Square link)",
        payLink: "https://square.link/u/tvd67HVK"
      },
      {
        name: "NFC Chips",
        desc: "Embed into signs, displays, packaging, or custom builds.",
        price: "$— (Square link)",
        payLink: "https://square.link/u/tvd67HVK"
      }
    ];

    const grid = document.getElementById("grid");

    function escapeHtml(s){
      return String(s||"")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function escapeAttr(s){ return escapeHtml(s).replace(/"/g,"&quot;"); }

    function render(){
      grid.innerHTML = "";
      for(const p of PRODUCTS){
        const el = document.createElement("div");
        el.className = "shop-item";
        el.innerHTML = `
          <h2>${escapeHtml(p.name)}</h2>
          <p>${escapeHtml(p.desc)}</p>
          <div class="shop-row">
            <div class="shop-price">${escapeHtml(p.price || "")}</div>
            <a class="shop-buy" href="${escapeAttr(p.payLink)}" target="_blank" rel="noopener">Buy on Square</a>
          </div>
        `;
        grid.appendChild(el);
      }
    }

    render();
  </script>
</body>
</html>
