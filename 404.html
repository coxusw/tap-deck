<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tap-Deck</title>
  <meta name="robots" content="noindex" />
</head>
<body>
<script>
  (function () {
    // Convert "/slug" -> "/?client=slug"
    var path = (location.pathname || "/").replace(/^\/+|\/+$/g, "");
    var qs = location.search || "";

    // If it's already the homepage or a known folder, just go home
    var known = ["", "theme-gallery", "pay", "preview", "admin", "intake", "shop", "assets", "themes", "data", "vcards"];
    if (known.indexOf(path.split("/")[0]) !== -1) {
      location.replace("/" + qs);
      return;
    }

    // preserve any query params by appending them after client
    var target = "/?client=" + encodeURIComponent(path);
    if (qs && qs !== "?") target += "&" + qs.replace(/^\?/, "");

    location.replace(target);
  })();
</script>
</body>
</html>
